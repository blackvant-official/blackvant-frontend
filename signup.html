<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - BlackVant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- Clerk Styles -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/style.css"
    />

    <!-- Clerk Script -->
    <script
      crossorigin="anonymous"
      data-clerk-publishable-key="pk_test_Y29taWMta2FuZ2Fyb28tMjMuY2xlcmsuYWNjb3VudHMuZGV2JA"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
    ></script>

  </head>

  <body class="auth-page">
    <header class="header">
      <div class="logo">BlackVant</div>
    </header>

    <main class="main">
      <div class="form-container">
        <div class="form-header">
          <h1>Create Account</h1>
          <p>Join BlackVant and start your journey</p>
        </div>

        <div id="clerk-signup"></div>

        <p class="signin-prompt">
          Already have an account?
          <a href="login.html" class="signin-link">Sign In</a>
        </p>
      </div>
    </main>

    <footer class="footer auth-footer">
      <div class="copyright">© 2025 BlackVant. All rights reserved.</div>
    </footer>

    <script src="assets/js/auth.js"></script>

    <script>
      window.addEventListener("load", async function () {
        const clerk = await waitForClerk();

        if (clerk.user && clerk.session) {
          window.location.replace("dashboard.html");
          return;
        }

        Clerk.mountSignUp(document.getElementById("clerk-signup"), {
          appearance: { baseTheme: "dark" },
          routing: "hash",
          afterSignUpUrl: "dashboard.html",
          afterSignInUrl: "dashboard.html",
          redirectUrl: "dashboard.html",
          signInUrl: "login.html",
        });
      });
    </script>
  </body>
</html>
